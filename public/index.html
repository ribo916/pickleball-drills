<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickle Lab — Drill Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1410;
    --surface: #181e19;
    --surface2: #1f2820;
    --accent: #b5e853;
    --accent2: #53e8a0;
    --text: #e8f0e9;
    --text-dim: #7a9b7d;
    --text-muted: #4a664d;
    --border: #2a3d2c;
    --tag-bg: #1a2e1c;
    --danger: #e85353;
    --radius: 8px;
    --font-display: 'Barlow Condensed', sans-serif;
    --font-body: 'Barlow', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 15px; line-height: 1.5; min-height: 100vh; }

  /* NAV */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .nav-logo { font-family: var(--font-display); font-weight: 800; font-size: 22px; letter-spacing: 0.02em; color: var(--accent); }
  .nav-logo span { color: var(--text-dim); font-weight: 400; }
  .btn { font-family: var(--font-display); font-weight: 700; font-size: 14px; letter-spacing: 0.06em; text-transform: uppercase; padding: 8px 16px; border-radius: var(--radius); border: none; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: #0f1410; }
  .btn-primary:hover { background: #c9f56a; }
  .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--text-dim); color: var(--text); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }

  /* VIEWS */
  .view { display: none; }
  .view.active { display: block; }

  /* LIBRARY */
  .library-header { padding: 24px 16px 16px; }
  .library-header h1 { font-family: var(--font-display); font-weight: 800; font-size: 32px; letter-spacing: 0.02em; line-height: 1; margin-bottom: 4px; }
  .library-header p { color: var(--text-dim); font-size: 14px; }
  .filter-bar { padding: 0 16px 16px; display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-chip { font-family: var(--font-mono); font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .filter-chip.active, .filter-chip:hover { background: var(--accent); color: #0f1410; border-color: var(--accent); }
  .drill-grid { padding: 0 16px 24px; display: grid; gap: 12px; }
  .drill-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden; animation: fadeIn 0.2s ease both; }
  .drill-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); opacity: 0; transition: opacity 0.15s; }
  .drill-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .drill-card:hover::before { opacity: 1; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .drill-name { font-family: var(--font-display); font-weight: 700; font-size: 20px; letter-spacing: 0.02em; line-height: 1.1; }
  .player-badge { font-family: var(--font-mono); font-size: 11px; background: var(--tag-bg); color: var(--accent2); padding: 3px 8px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; margin-left: 8px; }
  .drill-desc { color: var(--text-dim); font-size: 14px; margin-bottom: 12px; line-height: 1.4; }
  .tag-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag { font-family: var(--font-mono); font-size: 11px; padding: 3px 8px; border-radius: 4px; background: var(--tag-bg); color: var(--text-dim); border: 1px solid var(--border); }
  .step-count { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 10px; }

  /* DETAIL */
  .detail-header { padding: 16px; border-bottom: 1px solid var(--border); }
  .back-btn { font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); background: none; border: none; cursor: pointer; padding: 0; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .back-btn:hover { color: var(--text); }
  .detail-title { font-family: var(--font-display); font-weight: 800; font-size: 28px; letter-spacing: 0.02em; line-height: 1; margin-bottom: 6px; }
  .detail-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .detail-goal { padding: 14px 16px; background: var(--surface2); border-left: 3px solid var(--accent); margin: 12px 16px; border-radius: 0 var(--radius) var(--radius) 0; }
  .detail-goal .label { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 4px; }
  .detail-goal p { font-size: 14px; line-height: 1.5; color: var(--text); }

  /* SECTION LABEL (shared) */
  .section-label { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); margin-bottom: 8px; }

  /* COURT SVG */
  .court-section { padding: 0 16px; margin-bottom: 24px; }
  .court-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
  #detail-court-svg { width: 100%; height: auto; display: block; }

  /* STEPS */
  .steps-section { padding: 0 16px; margin-bottom: 16px; }
  .steps-list { display: grid; gap: 8px; }
  .step-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; display: flex; gap: 12px; align-items: flex-start; }
  .step-number { font-family: var(--font-mono); font-size: 11px; color: var(--accent); background: var(--tag-bg); border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px; flex-shrink: 0; margin-top: 2px; }
  .step-title { font-family: var(--font-display); font-weight: 700; font-size: 16px; margin-bottom: 3px; }
  .step-desc { font-size: 13px; color: var(--text-dim); line-height: 1.5; }

  /* ROLES */
  .roles-section { padding: 0 16px; margin-bottom: 16px; }
  .role-list { display: grid; gap: 8px; }
  .role-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; display: flex; gap: 10px; align-items: flex-start; }
  .role-dot { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 10px; font-weight: 500; flex-shrink: 0; margin-top: 1px; }
  .role-name { font-family: var(--font-display); font-weight: 700; font-size: 15px; margin-bottom: 2px; }
  .role-desc { font-size: 13px; color: var(--text-dim); line-height: 1.4; }

  /* NOTES */
  .notes-section { padding: 0 16px 16px; }
  .notes-list { list-style: none; display: grid; gap: 6px; }
  .notes-list li { font-size: 13px; color: var(--text-dim); padding-left: 18px; position: relative; line-height: 1.4; }
  .notes-list li::before { content: '→'; position: absolute; left: 0; color: var(--accent); font-size: 12px; }

  /* DETAIL ACTIONS */
  .detail-actions { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }

  /* CREATOR */
  .creator-header { padding: 16px; border-bottom: 1px solid var(--border); }
  .creator-title { font-family: var(--font-display); font-weight: 800; font-size: 26px; letter-spacing: 0.02em; }
  .form-body { padding: 16px; display: grid; gap: 16px; }
  .form-group { display: grid; gap: 6px; }
  .form-label { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); }
  .form-input, .form-textarea, .form-select { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--font-body); font-size: 14px; padding: 10px 12px; width: 100%; transition: border-color 0.15s; outline: none; }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent); }
  .form-textarea { min-height: 80px; resize: vertical; }
  .form-select option { background: var(--surface2); }
  .tag-picker { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag-toggle { font-family: var(--font-mono); font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); cursor: pointer; transition: all 0.15s; }
  .tag-toggle.selected { background: var(--accent); color: #0f1410; border-color: var(--accent); }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* POSITION EDITOR */
  .position-editor { display: grid; gap: 10px; }
  .position-editor-court { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px; }
  #creator-court-svg { width: 100%; height: auto; display: block; margin-bottom: 10px; }
  .position-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .position-input-row { display: flex; align-items: center; gap: 8px; }
  .position-label { font-family: var(--font-mono); font-size: 12px; font-weight: 500; width: 28px; flex-shrink: 0; }
  .position-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--font-mono); font-size: 13px; padding: 7px 10px; width: 70px; outline: none; text-transform: uppercase; transition: border-color 0.15s; }
  .position-input:focus { border-color: var(--accent); }
  .position-hint { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }

  /* ROLE BUILDER */
  .role-builder { display: grid; gap: 8px; }
  .role-row { display: grid; grid-template-columns: 90px 1fr; gap: 8px; align-items: start; }

  /* STEP BUILDER */
  .step-builder { display: grid; gap: 10px; }
  .step-item-builder { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
  .step-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .step-item-label { font-family: var(--font-mono); font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; }
  .step-remove { font-size: 16px; background: none; border: none; color: var(--text-muted); cursor: pointer; line-height: 1; padding: 0 4px; }
  .step-remove:hover { color: var(--danger); }
  .add-step-btn { font-family: var(--font-mono); font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; padding: 10px; border: 1px dashed var(--border); border-radius: var(--radius); background: transparent; color: var(--text-muted); cursor: pointer; width: 100%; transition: all 0.15s; }
  .add-step-btn:hover { border-color: var(--accent); color: var(--accent); }

  .creator-actions { padding: 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--accent); color: #0f1410; font-family: var(--font-mono); font-size: 13px; padding: 10px 20px; border-radius: 6px; transition: transform 0.25s ease; z-index: 1000; white-space: nowrap; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* EMPTY STATE */
  .empty-state { padding: 48px 16px; text-align: center; }
  .empty-state h2 { font-family: var(--font-display); font-weight: 700; font-size: 24px; color: var(--text-dim); margin-bottom: 6px; }
  .empty-state p { font-size: 13px; color: var(--text-muted); }

  @media (min-width: 600px) {
    .drill-grid { grid-template-columns: 1fr 1fr; }
    .form-body { max-width: 600px; }
    .creator-header, .creator-actions { max-width: 632px; }
    .position-inputs { grid-template-columns: 1fr 1fr 1fr 1fr; }
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .drill-card:nth-child(2) { animation-delay: 0.05s; }
  .drill-card:nth-child(3) { animation-delay: 0.1s; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">PICKLE<span>LAB</span></div>
  <div class="nav-actions">
    <button class="btn btn-ghost" onclick="showView('library')">Drills</button>
    <button class="btn btn-ghost" onclick="exportDrills()" title="Download all drills as CSV">Export</button>
    <button class="btn btn-primary" onclick="showCreator(null)">+ New</button>
  </div>
</nav>

<!-- LIBRARY -->
<div id="view-library" class="view active">
  <div class="library-header">
    <h1>Drill Library</h1>
    <p>Pickleball drills for weekend sessions</p>
  </div>
  <div class="filter-bar" id="filter-bar"></div>
  <div class="drill-grid" id="drill-grid"></div>
</div>

<!-- DETAIL -->
<div id="view-detail" class="view">
  <div class="detail-header">
    <button class="back-btn" onclick="showView('library')">← Back to library</button>
    <div class="detail-title" id="detail-name"></div>
    <div class="detail-meta" id="detail-meta"></div>
  </div>
  <div class="detail-goal" id="detail-goal"></div>
  <div class="roles-section">
    <div class="section-label">Player Roles</div>
    <div class="role-list" id="role-list"></div>
  </div>
  <div class="steps-section">
    <div class="section-label">Steps</div>
    <div class="steps-list" id="steps-list"></div>
  </div>
  <div class="notes-section" id="notes-section-wrap">
    <div class="section-label">Coaching Notes</div>
    <ul class="notes-list" id="notes-list"></ul>
  </div>
  <div class="court-section" id="court-section">
    <div class="section-label">Starting Positions</div>
    <div class="court-wrap">
      <svg id="detail-court-svg" viewBox="0 0 300 440" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>
  <div class="detail-actions">
    <button class="btn btn-ghost" onclick="editCurrentDrill()">Edit drill</button>
    <button class="btn btn-danger" onclick="deleteCurrentDrill()">Delete</button>
  </div>
</div>

<!-- CREATOR -->
<div id="view-creator" class="view">
  <div class="creator-header">
    <button class="back-btn" onclick="showView('library')">← Cancel</button>
    <div class="creator-title" id="creator-title">New Drill</div>
  </div>
  <div class="form-body">
    <div class="form-row-2">
      <div class="form-group">
        <label class="form-label">Drill Name</label>
        <input class="form-input" id="f-name" placeholder="e.g. Drip Practice" />
      </div>
      <div class="form-group">
        <label class="form-label">Player Count</label>
        <select class="form-select" id="f-players" onchange="updateCreatorCourt()">
          <option value="4">4 players</option>
          <option value="3">3 players</option>
          <option value="2">2 players</option>
          <option value="1">1 player</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Short Description</label>
      <input class="form-input" id="f-desc" placeholder="One-line summary" />
    </div>
    <div class="form-group">
      <label class="form-label">Goal</label>
      <textarea class="form-textarea" id="f-goal" placeholder="What should players improve or focus on?"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Tags</label>
      <div class="tag-picker" id="tag-picker"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Player Roles</label>
      <div class="role-builder" id="role-builder"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Drill Steps</label>
      <div class="step-builder" id="step-builder"></div>
      <button class="add-step-btn" onclick="addStepField()">+ Add Step</button>
    </div>
    <div class="form-group">
      <label class="form-label">Coaching Notes <span style="color:var(--text-muted);font-weight:400;text-transform:none;letter-spacing:0">(one per line)</span></label>
      <textarea class="form-textarea" id="f-notes" placeholder="Watch for early wrist snap&#10;Reset if rally breaks down"></textarea>
    </div>

    <!-- POSITION EDITOR -->
    <div class="form-group">
      <label class="form-label">Starting Positions</label>
      <div class="position-editor">
        <div class="position-editor-court">
          <svg id="creator-court-svg" viewBox="0 0 300 440" xmlns="http://www.w3.org/2000/svg"></svg>
          <div class="position-inputs" id="position-inputs"></div>
          <div class="position-hint" style="margin-top:8px">Columns A–F (left→right) · Rows 1–8 (Team A baseline→Team B baseline) · e.g. C2, E6</div>
        </div>
      </div>
    </div>
  </div>
  <div class="creator-actions">
    <button class="btn btn-primary" onclick="saveDrill()">Save Drill</button>
    <button class="btn btn-ghost" onclick="showView('library')">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── CONSTANTS ────────────────────────────────────────────────────────────────

const PLAYER_COLORS = ['#b5e853', '#53e8a0', '#e8a053', '#e853a0'];
const PLAYER_LABELS = ['P1', 'P2', 'P3', 'P4'];

// Grid: 6 cols (A-F), 8 rows (1-8)
// Row 1-2: Team A baseline zone
// Row 3:   Team A NVZ interior (kitchen)
// Row 4:   Net zone — net at the BOTTOM of row 4
// Row 5:   Team B NVZ interior (kitchen)
// Row 6:   Team B post-kitchen transition
// Row 7-8: Team B baseline zone
// Kitchen line Team A = bottom of row 3; Kitchen line Team B = bottom of row 5
// Players standing BEHIND kitchen line = row 3 (Team A) or row 6 (Team B)
const GRID_COLS = ['A','B','C','D','E','F'];
const GRID_ROWS = 8;

// Court SVG dimensions
const CW = 300, CH = 440;
const COURT_PAD_X = 30, COURT_PAD_TOP = 20, COURT_PAD_BOT = 20;
const COURT_W = CW - COURT_PAD_X * 2;
const COURT_H = CH - COURT_PAD_TOP - COURT_PAD_BOT;
const CELL_W = COURT_W / 6;
const CELL_H = COURT_H / 8;
// All lines snap to grid row boundaries
const NET_Y     = COURT_PAD_TOP + 4 * CELL_H;  // bottom of row 4
const NVZ_TOP_Y = COURT_PAD_TOP + 3 * CELL_H;  // bottom of row 3 = Team A kitchen line
const NVZ_BOT_Y = COURT_PAD_TOP + 5 * CELL_H;  // bottom of row 5 = Team B kitchen line

const ALL_TAGS = ['dinking','driving','3rd shot drop','NVZ','poaching','reset','transition','feeding','defense','consistency'];

// ─── DEFAULT DRILL DATA ───────────────────────────────────────────────────────

const DEFAULT_DRILLS = [
  {
    id: 'drill-drip',
    name: 'Drip Practice',
    players: 4,
    desc: 'P1 simulates a bad return from near the baseline. P3 and P4 (Team B) work the 3rd-shot drop. P2 (Team A) threatens the poach from the NVZ.',
    goal: 'Train the 3rd-shot drop under realistic game pressure. P3 must drip to P1\'s feet to neutralize the point and earn the transition forward. P1 practices recovering from a bad situation by moving forward and split-stepping. P2 creates poach pressure from the NVZ while staying honest to the backside.',
    tags: ['3rd shot drop','NVZ','driving','reset','poaching'],
    startPositions: { P1: 'E8', P2: 'C6', P3: 'E1', P4: 'B1' },
    roles: [
      { label: 'P1 — Bad Returner (Team A)', color: 0, desc: 'Starts near the baseline right, simulating a player who just hit a poor return that landed short. Feeds a high floaty ball to P3, then immediately moves forward toward the NVZ and split-steps — feet should land as P3 makes contact.' },
      { label: 'P2 — Poach Threat (Team A)', color: 1, desc: 'Holds position just behind the kitchen line, left-center, shading the middle. Read P3\'s contact before committing to a poach. If the ball pops up, take it. Don\'t abandon the backside early.' },
      { label: 'P3 — 3rd Shot Driver (Team B)', color: 2, desc: 'Starts at the baseline right. Receives P1\'s feed and executes the 3rd-shot drop, targeting P1\'s feet to force a reset and neutralize P2\'s poach. Keep moving toward NVZ after contact — the drop is a transition, not a destination.' },
      { label: 'P4 — Baseline Support (Team B)', color: 3, desc: 'Starts at the baseline left. Mirrors P3\'s starting position. Watches P1 — if P1 pops the drop up, P4 is in position to put pressure on. Begin moving forward together with P3 after the drop lands.' }
    ],
    steps: [
      { title: 'Setup', desc: 'P1 (Team A) is near the baseline right with a ball — simulating a bad return. P2 (Team A) is just behind the kitchen line, shading the middle. P3 and P4 (Team B) are both at the baseline on their respective sides.' },
      { title: 'P1 Feeds', desc: 'P1 hits a high, floaty ball toward P3, simulating a return that came up short and sits in the court. The moment the ball leaves P1\'s paddle, P1 starts moving forward toward NVZ.' },
      { title: 'P3 Drops — P1 Split-Steps — P2 Reads', desc: 'P3 moves to the ball and drops cross-court toward P1\'s feet. P1 split-steps as P3 contacts — feet land, ready to move either direction. P2 reads P3\'s paddle face before committing to the poach.' },
      { title: 'Resolution', desc: 'Clean drop at P1\'s feet: P1 is forced to reset low, P3 and P4 advance together toward NVZ, P2 holds. Popup: P2 attacks, P4 reacts. Either way — P3 and P4 keep moving forward.' },
      { title: 'Rotate', desc: 'P3 and P4 rotate spots each rep. After 5 reps, P1 and P2 swap sides with P3 and P4 so everyone practices both roles.' }
    ],
    notes: [
      'P1: move the instant the ball leaves your paddle — not after you watch where it lands.',
      'P1: split-step timing — feet land as P3 contacts. Early is wrong, late is wrong.',
      'P3: the drop targets P1\'s feet, not P2. Targeting P2\'s body hands P2 an easy ball.',
      'P2: read shoulder and paddle face before committing. Early poach = exposed backside.',
      'P4: don\'t just stand there — start your transition forward as soon as P3 contacts.',
    ]
  },
  {
    id: 'drill-dink-cross',
    name: 'Cross-Court Dink Rally',
    players: 4,
    desc: 'Two parallel cross-court dink rallies run simultaneously at the NVZ. Each pair competes for longest unbroken rally.',
    goal: 'Build dinking consistency under low stress. Aim for long unbroken rallies while placing the ball at the opponent\'s outside hip. Patience over aggression.',
    tags: ['dinking','NVZ','consistency','reset'],
    startPositions: { P1: 'B3', P2: 'E3', P3: 'B6', P4: 'E6' },
    roles: [

    ],

// ─── GRID MATH ────────────────────────────────────────────────────────────────

function gridToXY(coord) {
  if (!coord || coord.length < 2) return null;
  const col = coord[0].toUpperCase();
  const row = parseInt(coord.slice(1));
  const ci = GRID_COLS.indexOf(col);
  if (ci < 0 || isNaN(row) || row < 1 || row > GRID_ROWS) return null;
  const x = COURT_PAD_X + ci * CELL_W + CELL_W / 2;
  const y = COURT_PAD_TOP + (row - 1) * CELL_H + CELL_H / 2;
  return { x, y };
}

// ─── COURT SVG BUILDER ───────────────────────────────────────────────────────

function buildCourtSVG(positions, interactive) {
  // positions: { P1: 'C2', P2: 'D6', ... } — only defined players
  let s = '';

  // Court surface
  s += `<rect x="${COURT_PAD_X}" y="${COURT_PAD_TOP}" width="${COURT_W}" height="${COURT_H}" rx="3" fill="#243528"/>`;

  // Grid cells (subtle)
  for (let r = 0; r < GRID_ROWS; r++) {
    for (let c = 0; c < 6; c++) {
      const x = COURT_PAD_X + c * CELL_W;
      const y = COURT_PAD_TOP + r * CELL_H;
      const isNVZ_A = r === 2 || r === 3; // rows 3-4 (0-indexed): Team A NVZ interior + net zone
      const isNVZ_B = r === 4 || r === 5; // rows 5-6 (0-indexed): Team B NVZ interior + transition
      const fill = isNVZ_A || isNVZ_B ? '#1e3322' : 'none';
      s += `<rect x="${x}" y="${y}" width="${CELL_W}" height="${CELL_H}" fill="${fill}" stroke="#2e4a32" stroke-width="0.5" opacity="0.7"/>`;
    }
  }

  // Column labels (A-F) at top
  GRID_COLS.forEach((col, i) => {
    const x = COURT_PAD_X + i * CELL_W + CELL_W / 2;
    s += `<text x="${x}" y="${COURT_PAD_TOP - 6}" text-anchor="middle" fill="#4a664d" font-size="9" font-family="DM Mono, monospace">${col}</text>`;
  });

  // Row labels (1-8) on left
  for (let r = 0; r < GRID_ROWS; r++) {
    const y = COURT_PAD_TOP + r * CELL_H + CELL_H / 2 + 3;
    s += `<text x="${COURT_PAD_X - 6}" y="${y}" text-anchor="end" fill="#4a664d" font-size="9" font-family="DM Mono, monospace">${r + 1}</text>`;
  }

  // NVZ lines
  s += `<line x1="${COURT_PAD_X}" y1="${NVZ_TOP_Y}" x2="${COURT_PAD_X + COURT_W}" y2="${NVZ_TOP_Y}" stroke="#5a8a5e" stroke-width="1.5"/>`;
  s += `<line x1="${COURT_PAD_X}" y1="${NVZ_BOT_Y}" x2="${COURT_PAD_X + COURT_W}" y2="${NVZ_BOT_Y}" stroke="#5a8a5e" stroke-width="1.5"/>`;

  // NVZ labels
  const nvzLabelX = COURT_PAD_X + COURT_W + 4;
  s += `<text x="${nvzLabelX}" y="${NVZ_TOP_Y - 2}" fill="#4a664d" font-size="7.5" font-family="DM Mono, monospace">NVZ</text>`;
  s += `<text x="${nvzLabelX}" y="${NVZ_BOT_Y + 9}" fill="#4a664d" font-size="7.5" font-family="DM Mono, monospace">NVZ</text>`;

  // Center line
  s += `<line x1="${COURT_PAD_X + COURT_W/2}" y1="${COURT_PAD_TOP}" x2="${COURT_PAD_X + COURT_W/2}" y2="${COURT_PAD_TOP + COURT_H}" stroke="#2e4a32" stroke-width="1"/>`;

  // Net
  s += `<rect x="${COURT_PAD_X}" y="${NET_Y - 3}" width="${COURT_W}" height="6" rx="2" fill="#4a7a4e"/>`;
  s += `<text x="${COURT_PAD_X + COURT_W / 2}" y="${NET_Y + 1.5}" text-anchor="middle" dominant-baseline="middle" fill="#7aaa7e" font-size="8" font-family="DM Mono, monospace">NET</text>`;

  // Court border
  s += `<rect x="${COURT_PAD_X}" y="${COURT_PAD_TOP}" width="${COURT_W}" height="${COURT_H}" rx="3" fill="none" stroke="#4a7a4e" stroke-width="1.5"/>`;

  // Team labels
  s += `<text x="${COURT_PAD_X + COURT_W/2}" y="${COURT_PAD_TOP + CELL_H * 1}" text-anchor="middle" fill="#3a5a3e" font-size="10" font-family="DM Mono, monospace" font-weight="500">TEAM A</text>`;
  s += `<text x="${COURT_PAD_X + COURT_W/2}" y="${COURT_PAD_TOP + CELL_H * 7}" text-anchor="middle" fill="#3a5a3e" font-size="10" font-family="DM Mono, monospace" font-weight="500">TEAM B</text>`;

  // Player tokens
  PLAYER_LABELS.forEach((label, i) => {
    const coord = positions && positions[label];
    if (!coord) return;
    const pos = gridToXY(coord);
    if (!pos) return;
    const color = PLAYER_COLORS[i];
    s += `<circle cx="${pos.x}" cy="${pos.y}" r="13" fill="${color}25" stroke="${color}" stroke-width="2"/>`;
    s += `<text x="${pos.x}" y="${pos.y}" text-anchor="middle" dominant-baseline="middle" fill="${color}" font-size="10" font-family="DM Mono, monospace" font-weight="500">${label}</text>`;
  });

  return s;
}

// ─── STATE ────────────────────────────────────────────────────────────────────

let drills = [];
let currentDrillId = null;
let editingId = null;
let activeFilter = 'all';
let selectedTags = [];
let stepCount = 0;

// Storage abstraction — uses window.storage (Claude artifact) with localStorage fallback
const storage = {
  async get(key) {
    if (window.storage && window.storage.get) {
      const result = await window.storage.get(key, true);
      return result ? result.value : null;
    }
    return localStorage.getItem(key);
  },
  async set(key, value) {
    if (window.storage && window.storage.set) {
      await window.storage.set(key, value, true);
    } else {
      localStorage.setItem(key, value);
    }
  }
};

async function loadDrills() {
  try {
    const raw = await storage.get('drills');
    if (!raw) throw new Error('empty');
    const stored = JSON.parse(raw);
    const isStale = !Array.isArray(stored) || stored.length === 0 ||
      stored.some(d => d.startPositions === undefined);
    if (isStale) throw new Error('stale');
    drills = stored;
  } catch(e) {
    drills = JSON.parse(JSON.stringify(DEFAULT_DRILLS));
    await saveDrills();
  }
}

async function saveDrills() {
  try {
    await storage.set('drills', JSON.stringify(drills));
  } catch(e) {
    console.error('Storage write failed:', e);
  }
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  if (name === 'library') renderLibrary();
  window.scrollTo(0, 0);
}

// ─── LIBRARY ─────────────────────────────────────────────────────────────────

function renderLibrary() {
  const allTags = new Set(['all']);
  drills.forEach(d => d.tags.forEach(t => allTags.add(t)));
  document.getElementById('filter-bar').innerHTML = [...allTags].map(t => `
    <button class="filter-chip ${activeFilter === t ? 'active' : ''}" onclick="setFilter('${t}')">${t === 'all' ? 'All' : t}</button>
  `).join('');
  const filtered = activeFilter === 'all' ? drills : drills.filter(d => d.tags.includes(activeFilter));
  const grid = document.getElementById('drill-grid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state"><h2>No drills yet</h2><p>Add your first drill with the + New button</p></div>`;
    return;
  }
  grid.innerHTML = filtered.map(d => `
    <div class="drill-card" onclick="openDrill('${d.id}')">
      <div class="card-top">
        <div class="drill-name">${esc(d.name)}</div>
        <div class="player-badge">${d.players}P</div>
      </div>
      <div class="drill-desc">${esc(d.desc)}</div>
      <div class="tag-row">${d.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>
      <div class="step-count">${d.steps.length} steps</div>
    </div>
  `).join('');
}

function setFilter(tag) { activeFilter = tag; renderLibrary(); }

// ─── DETAIL ───────────────────────────────────────────────────────────────────

function openDrill(id) {
  currentDrillId = id;
  const drill = drills.find(d => d.id === id);
  if (!drill) return;

  document.getElementById('detail-name').textContent = drill.name;
  document.getElementById('detail-meta').innerHTML = `
    <span class="player-badge">${drill.players} players</span>
    ${drill.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}
  `;
  document.getElementById('detail-goal').innerHTML = `
    <div class="label">Drill Goal</div><p>${esc(drill.goal)}</p>
  `;

  // Court
  const svg = document.getElementById('detail-court-svg');
  const hasPositions = drill.startPositions && Object.keys(drill.startPositions).length > 0;
  document.getElementById('court-section').style.display = hasPositions ? '' : 'none';
  if (hasPositions) svg.innerHTML = buildCourtSVG(drill.startPositions, false);

  // Steps
  document.getElementById('steps-list').innerHTML = drill.steps.map((s, i) => `
    <div class="step-item">
      <div class="step-number">${i + 1}</div>
      <div>
        <div class="step-title">${esc(s.title)}</div>
        <div class="step-desc">${esc(s.desc)}</div>
      </div>
    </div>
  `).join('');

  // Roles
  document.getElementById('role-list').innerHTML = drill.roles.map((r, i) => `
    <div class="role-item">
      <div class="role-dot" style="background:${PLAYER_COLORS[i]}20;color:${PLAYER_COLORS[i]};border:1.5px solid ${PLAYER_COLORS[i]}">${PLAYER_LABELS[i]}</div>
      <div>
        <div class="role-name">${esc(r.label)}</div>
        <div class="role-desc">${esc(r.desc)}</div>
      </div>
    </div>
  `).join('');

  // Notes
  const notesList = document.getElementById('notes-list');
  if (drill.notes && drill.notes.length) {
    notesList.innerHTML = drill.notes.map(n => `<li>${esc(n)}</li>`).join('');
    document.getElementById('notes-section-wrap').style.display = '';
  } else {
    document.getElementById('notes-section-wrap').style.display = 'none';
  }

  showView('detail');
}

// ─── CREATOR ──────────────────────────────────────────────────────────────────

function showCreator(id) {
  editingId = id;
  selectedTags = [];
  stepCount = 0;
  document.getElementById('creator-title').textContent = id ? 'Edit Drill' : 'New Drill';

  // Tags
  document.getElementById('tag-picker').innerHTML = ALL_TAGS.map(t =>
    `<button class="tag-toggle" onclick="toggleTag(this,'${t}')">${t}</button>`
  ).join('');

  // Steps
  document.getElementById('step-builder').innerHTML = '';

  // Roles
  document.getElementById('role-builder').innerHTML = [0,1,2,3].map(i => `
    <div class="role-row">
      <input class="form-input" id="role-label-${i}" placeholder="${PLAYER_LABELS[i]} role" style="padding:8px 10px;font-size:13px"/>
      <textarea class="form-textarea" id="role-desc-${i}" placeholder="What ${PLAYER_LABELS[i]} does..." style="min-height:60px;font-size:13px"></textarea>
    </div>
  `).join('');

  if (id) {
    const drill = drills.find(d => d.id === id);
    if (drill) prefillForm(drill);
  } else {
    document.getElementById('f-name').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-goal').value = '';
    document.getElementById('f-notes').value = '';
    document.getElementById('f-players').value = '4';
    addStepField();
  }

  buildPositionInputs();
  showView('creator');
}

function buildPositionInputs() {
  const count = parseInt(document.getElementById('f-players').value);
  const container = document.getElementById('position-inputs');
  container.innerHTML = PLAYER_LABELS.slice(0, count).map((label, i) => `
    <div class="position-input-row">
      <div class="position-label" style="color:${PLAYER_COLORS[i]}">${label}</div>
      <input class="position-input" id="pos-${label}" maxlength="3"
        placeholder="—" oninput="renderCreatorCourt()"
        style="border-color:${PLAYER_COLORS[i]}40"/>
    </div>
  `).join('');
  renderCreatorCourt();
}

function updateCreatorCourt() {
  // Called by player count change — rebuild inputs then re-render
  buildPositionInputs();
}

function renderCreatorCourt() {
  const count = parseInt(document.getElementById('f-players').value);
  const positions = {};
  PLAYER_LABELS.slice(0, count).forEach(label => {
    const el = document.getElementById(`pos-${label}`);
    if (el && el.value.trim()) positions[label] = el.value.trim().toUpperCase();
  });
  document.getElementById('creator-court-svg').innerHTML = buildCourtSVG(positions, true);
}

function prefillForm(drill) {
  document.getElementById('f-name').value = drill.name;
  document.getElementById('f-desc').value = drill.desc;
  document.getElementById('f-goal').value = drill.goal;
  document.getElementById('f-notes').value = (drill.notes || []).join('\n');
  document.getElementById('f-players').value = String(drill.players);

  selectedTags = [...(drill.tags || [])];
  document.querySelectorAll('.tag-toggle').forEach(btn => {
    if (selectedTags.includes(btn.textContent)) btn.classList.add('selected');
  });

  drill.roles.forEach((r, i) => {
    const l = document.getElementById(`role-label-${i}`);
    const d = document.getElementById(`role-desc-${i}`);
    if (l) l.value = r.label;
    if (d) d.value = r.desc;
  });

  document.getElementById('step-builder').innerHTML = '';
  stepCount = 0;
  drill.steps.forEach(s => addStepField(s.title, s.desc));

  // Positions — set after buildPositionInputs runs inside showCreator
  if (drill.startPositions) {
    // Defer to next tick so inputs exist
    setTimeout(() => {
      Object.entries(drill.startPositions).forEach(([label, coord]) => {
        const el = document.getElementById(`pos-${label}`);
        if (el) el.value = coord;
      });
      updateCreatorCourt();
    }, 0);
  }
}

function toggleTag(btn, tag) {
  if (selectedTags.includes(tag)) {
    selectedTags = selectedTags.filter(t => t !== tag);
    btn.classList.remove('selected');
  } else {
    selectedTags.push(tag);
    btn.classList.add('selected');
  }
}

function addStepField(title = '', desc = '') {
  const idx = stepCount++;
  const div = document.createElement('div');
  div.className = 'step-item-builder';
  div.id = `step-${idx}`;
  div.innerHTML = `
    <div class="step-item-header">
      <div class="step-item-label">Step ${idx + 1}</div>
      <button class="step-remove" onclick="removeStep(${idx})">×</button>
    </div>
    <div class="form-group" style="margin-bottom:8px">
      <input class="form-input" id="step-title-${idx}" placeholder="Step title" value="${esc(title)}" style="font-size:13px;padding:8px 10px"/>
    </div>
    <textarea class="form-textarea" id="step-desc-${idx}" placeholder="What happens in this step?" style="min-height:64px;font-size:13px">${esc(desc)}</textarea>
  `;
  document.getElementById('step-builder').appendChild(div);
}

function removeStep(idx) {
  const el = document.getElementById(`step-${idx}`);
  if (el) el.remove();
}

async function saveDrill() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('Drill needs a name'); return; }

  const players = parseInt(document.getElementById('f-players').value);

  // Collect positions
  const startPositions = {};
  PLAYER_LABELS.slice(0, players).forEach(label => {
    const el = document.getElementById(`pos-${label}`);
    if (el && el.value.trim()) {
      const v = el.value.trim().toUpperCase();
      if (gridToXY(v)) startPositions[label] = v;
    }
  });

  // Collect steps
  const steps = [];
  document.querySelectorAll('.step-item-builder').forEach((el, i) => {
    const id = el.id.replace('step-', '');
    const t = document.getElementById(`step-title-${id}`)?.value.trim() || '';
    const d = document.getElementById(`step-desc-${id}`)?.value.trim() || '';
    if (t || d) steps.push({ title: t || `Step ${i + 1}`, desc: d });
  });

  // Collect roles
  const roles = [];
  for (let i = 0; i < players && i < 4; i++) {
    roles.push({
      label: document.getElementById(`role-label-${i}`)?.value.trim() || PLAYER_LABELS[i],
      color: i,
      desc: document.getElementById(`role-desc-${i}`)?.value.trim() || ''
    });
  }

  const notesRaw = document.getElementById('f-notes').value.trim();
  const notes = notesRaw ? notesRaw.split('\n').map(s => s.trim()).filter(Boolean) : [];

  const drill = {
    id: editingId || `drill-${Date.now()}`,
    name,
    players,
    desc: document.getElementById('f-desc').value.trim(),
    goal: document.getElementById('f-goal').value.trim(),
    tags: selectedTags,
    startPositions,
    roles,
    steps,
    notes
  };

  if (editingId) {
    const idx = drills.findIndex(d => d.id === editingId);
    if (idx >= 0) drills[idx] = drill; else drills.push(drill);
  } else {
    drills.push(drill);
  }

  await saveDrills();
  showToast(editingId ? 'Drill updated' : 'Drill saved');
  setTimeout(() => showView('library'), 400);
}

function editCurrentDrill() { showCreator(currentDrillId); }

async function deleteCurrentDrill() {
  if (!confirm('Delete this drill?')) return;
  drills = drills.filter(d => d.id !== currentDrillId);
  await saveDrills();
  showView('library');
}

// ─── EXPORT ───────────────────────────────────────────────────────────────────

function exportDrills() {
  if (!drills.length) { showToast('No drills to export'); return; }

  const csvCell = v => {
    const s = (v === null || v === undefined) ? '' : String(v);
    // Always quote — simplest safe approach
    return '"' + s.replace(/"/g, '""') + '"';
  };

  const headers = [
    'Name', 'Players', 'Description', 'Goal', 'Tags',
    'P1 Start', 'P2 Start', 'P3 Start', 'P4 Start',
    'Role P1', 'Role P1 Desc',
    'Role P2', 'Role P2 Desc',
    'Role P3', 'Role P3 Desc',
    'Role P4', 'Role P4 Desc',
    'Step 1', 'Step 1 Desc',
    'Step 2', 'Step 2 Desc',
    'Step 3', 'Step 3 Desc',
    'Step 4', 'Step 4 Desc',
    'Step 5', 'Step 5 Desc',
    'Notes'
  ];

  const rows = drills.map(d => {
    const pos = d.startPositions || {};
    const roles = d.roles || [];
    const steps = d.steps || [];
    const notes = (d.notes || []).join(' | ');

    const cols = [
      d.name,
      d.players,
      d.desc,
      d.goal,
      (d.tags || []).join(', '),
      pos.P1 || '', pos.P2 || '', pos.P3 || '', pos.P4 || '',
    ];

    // Roles — up to 4
    for (let i = 0; i < 4; i++) {
      cols.push(roles[i] ? roles[i].label : '');
      cols.push(roles[i] ? roles[i].desc  : '');
    }

    // Steps — up to 5
    for (let i = 0; i < 5; i++) {
      cols.push(steps[i] ? steps[i].title : '');
      cols.push(steps[i] ? steps[i].desc  : '');
    }

    cols.push(notes);
    return cols.map(csvCell).join(',');
  });

  const csv = [headers.map(csvCell).join(','), ...rows].join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'pickleball-drills-' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Exported ' + drills.length + ' drill' + (drills.length !== 1 ? 's' : ''));
}

// ─── UTILS ────────────────────────────────────────────────────────────────────

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

(async () => {
  await loadDrills();
  renderLibrary();
})();
</script>
