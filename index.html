<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickle Lab — Drill Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/src/style.css">
</head>
<body>

<nav>
  <div class="nav-logo">PICKLE<span>LAB</span></div>
  <div class="nav-actions">
    <button class="btn btn-primary btn-icon" onclick="showView('library')" title="Home">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
        <path d="M9 21V12h6v9"/>
      </svg>
    </button>
    <div class="theme-btn-wrap">
      <button class="btn btn-ghost btn-icon" onclick="toggleThemePicker()" title="Switch Theme">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C6.48 2 2 6.48 2 12c0 2.4.85 4.6 2.26 6.33.7.87 1.74 1.67 3.24 1.67 1.5 0 2.5-1 2.5-2.5v-.25c0-.41.34-.75.75-.75H16c3.31 0 6-2.69 6-6 0-5.52-4.48-10-10-10z"/>
          <circle cx="8" cy="14" r="1" fill="currentColor" stroke="none"/>
          <circle cx="8" cy="9" r="1" fill="currentColor" stroke="none"/>
          <circle cx="12" cy="6.5" r="1" fill="currentColor" stroke="none"/>
          <circle cx="16" cy="9" r="1" fill="currentColor" stroke="none"/>
        </svg>
      </button>
      <div class="theme-picker" id="theme-picker">
        <button class="theme-option" data-theme="court" onclick="setTheme('court')">
          <span class="theme-swatch" style="background:#7ecf2b"></span>Court
        </button>
        <button class="theme-option" data-theme="night" onclick="setTheme('night')">
          <span class="theme-swatch" style="background:#22d3ee"></span>Night
        </button>
        <button class="theme-option" data-theme="clean" onclick="setTheme('clean')">
          <span class="theme-swatch" style="background:#e05c00"></span>Clean <span style="opacity:0.5;font-size:10px">(light)</span>
        </button>
        <button class="theme-option" data-theme="client" onclick="setTheme('client')">
          <span class="theme-swatch" style="background:#2563eb"></span>Client <span style="opacity:0.5;font-size:10px">(light)</span>
        </button>
      </div>
    </div>
    <button class="btn btn-ghost btn-icon session-nav-btn" onclick="showSession()" title="Session Queue">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
        <circle cx="3" cy="6" r="1" fill="currentColor" stroke="none"/><circle cx="3" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="3" cy="18" r="1" fill="currentColor" stroke="none"/>
      </svg>
      <span class="session-badge" id="session-badge"></span>
    </button>
    <button class="btn btn-ghost btn-icon" onclick="showRandomizer()" title="Random Drill">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="4"/>
        <circle cx="8"  cy="8"  r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="16" cy="8"  r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="8"  cy="16" r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="16" cy="16" r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/>
      </svg>
    </button>
    <button class="btn btn-primary btn-icon" onclick="showCreator(null)" title="New Drill">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
  </div>
</nav>

<!-- LIBRARY -->
<div id="view-library" class="view active">
  <div class="library-header">
    <div class="library-header-top">
      <div>
        <h1>Drill Library</h1>
        <p>Pickleball drills for weekend sessions</p>
      </div>
      <button class="btn btn-ghost btn-sm quick-add-btn" onclick="openQuickAdd()">+ Quick Add</button>
    </div>
    <div class="library-search-row">
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input class="library-search-input" id="library-search" type="search" placeholder="Search drills…" oninput="setLibrarySearch(this.value)" autocomplete="off" />
      </div>
    </div>
    <div class="library-controls-row">
      <div class="sort-pills">
        <button class="sort-pill" data-sort="name" onclick="setLibrarySort('name')">Name</button>
        <button class="sort-pill" data-sort="newest" onclick="setLibrarySort('newest')">Newest</button>
        <button class="sort-pill" data-sort="players" onclick="setLibrarySort('players')">Players</button>
      </div>
      <button class="fav-filter-btn" id="fav-filter-btn" onclick="toggleFavoritesFilter()" aria-label="Toggle favorites filter">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M8 13.5C8 13.5 1.5 9.5 1.5 5.5C1.5 3.567 3.067 2 5 2C6.193 2 7.25 2.6 8 3.5C8.75 2.6 9.807 2 11 2C12.933 2 14.5 3.567 14.5 5.5C14.5 9.5 8 13.5 8 13.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="filter-bar" id="filter-bar"></div>
  <div class="drill-grid" id="drill-grid"></div>
</div>

<!-- DETAIL -->
<div id="view-detail" class="view">
  <div class="detail-header">
    <button class="back-btn" onclick="showView('library')">← Back to library</button>
    <div class="detail-title" id="detail-name"></div>
    <div class="detail-meta" id="detail-meta"></div>
  </div>
  <div class="detail-goal" id="detail-goal"></div>
  <div id="legacy-court-section" class="legacy-court-section"></div>
  <div id="detail-video-section" style="display:none"></div>
  <div class="steps-section" id="steps-section-wrap">
    <div class="step-slideshow">
      <div class="step-slide-header">
        <button class="step-nav-btn" id="step-prev" onclick="stepNav(-1)">‹</button>
        <div class="step-slide-indicator" id="step-indicator"></div>
        <button class="step-nav-btn" id="step-next" onclick="stepNav(1)">›</button>
      </div>
      <div id="step-slide"></div>
    </div>
  </div>
  <div class="detail-actions"></div>
</div>

<!-- CREATOR -->
<div id="view-creator" class="view">
  <div class="creator-header">
    <button class="back-btn" onclick="showView('library')">← Cancel</button>
    <div class="creator-title" id="creator-title">New Drill</div>
  </div>
  <div class="form-body">
    <div class="form-group">
      <label class="form-label">Drill Name *</label>
      <input class="form-input" id="f-name" placeholder="e.g. Drip Practice" />
    </div>
    <div class="form-group">
      <label class="form-label">Description <span style="color:var(--text-muted);font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
      <textarea class="form-textarea" id="f-desc" style="min-height:100px" placeholder="What is this drill and what should players focus on?"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Video URL <span style="color:var(--text-muted);font-weight:400;text-transform:none;letter-spacing:0">(YouTube or Vimeo, optional)</span></label>
      <input class="form-input" id="f-video" placeholder="https://youtu.be/… or https://vimeo.com/…" type="url" inputmode="url" autocomplete="off" />
    </div>
    <div class="form-group">
      <label class="form-label">Players</label>
      <div class="tag-picker" id="player-count-picker">
        <button class="tag-toggle" data-count="2" onclick="selectPlayerCount(2)">2 players</button>
        <button class="tag-toggle" data-count="3" onclick="selectPlayerCount(3)">3 players</button>
        <button class="tag-toggle selected" data-count="4" onclick="selectPlayerCount(4)">4 players</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Steps</label>
      <div class="step-builder" id="step-builder"></div>
      <button class="add-step-btn" onclick="addStepField()">+ Add Step</button>
    </div>
    <details class="form-group">
      <summary class="form-label" style="cursor:pointer;list-style:none">Tags <span style="color:var(--text-muted);font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></summary>
      <div style="margin-top:8px;display:grid;gap:8px">
        <div class="tag-picker" id="tag-picker"></div>
        <div class="custom-tag-row">
          <input class="form-input custom-tag-input" id="custom-tag-input"
            placeholder="Add custom tag…" maxlength="32"
            onkeydown="if(event.key==='Enter'){event.preventDefault();addCustomTag()}"/>
          <button class="btn btn-ghost btn-sm" onclick="addCustomTag()">Add</button>
        </div>
      </div>
    </details>
  </div>
  <div class="creator-actions">
    <button class="btn btn-primary" onclick="saveDrill()">Save Drill</button>
    <button class="btn btn-ghost" onclick="showView('library')">Cancel</button>
  </div>
</div>

<!-- RANDOMIZER -->
<div id="view-randomizer" class="view">
  <div class="randomizer-header">
    <button class="back-btn" onclick="showView('library')">← Back</button>
    <div class="randomizer-title">PICK A DRILL</div>
    <p class="randomizer-sub">Filter by tag, or just roll the dice</p>
  </div>
  <div class="randomizer-section-label">Players</div>
  <div class="randomizer-tags" id="randomizer-players"></div>
  <div class="randomizer-section-label">Focus</div>
  <div class="randomizer-tags" id="randomizer-tags"></div>
  <div class="randomizer-action">
    <button class="btn btn-primary randomizer-roll-btn" onclick="pickRandomDrill()">🎲 Pick a Drill</button>
  </div>
  <div class="randomizer-result" id="randomizer-result"></div>
  <canvas id="randomizer-canvas"></canvas>
</div>

<!-- SESSION -->
<div id="view-session" class="view">
  <div class="session-header">
    <button class="back-btn" onclick="showView('library')">← Back</button>
    <div class="session-title">SESSION QUEUE</div>
  </div>
  <div id="session-list" class="session-list"></div>
  <div class="session-footer">
    <button class="btn btn-danger" onclick="clearSession()">End Session</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- COURT MODAL -->
<div id="court-modal" class="court-modal" onclick="closeCourtModal()">
  <div class="court-modal-inner" onclick="event.stopPropagation()">
    <div class="court-modal-header">
      <span class="court-modal-title" id="court-modal-label">Set Positions</span>
      <button class="btn btn-primary btn-sm" onclick="closeCourtModal()">Done</button>
    </div>
    <div class="player-selector" id="modal-player-selector"></div>
    <svg id="court-modal-svg" viewBox="0 0 390 540" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<!-- QUICK-ADD MODAL -->
<div id="modal-quick-add" class="quick-add-backdrop" onclick="closeQuickAdd()" style="display:none">
  <div class="quick-add-modal" onclick="event.stopPropagation()">
    <div class="quick-add-header">
      <span class="quick-add-title">Quick Add Drill</span>
      <button class="btn btn-ghost btn-sm" onclick="closeQuickAdd()">✕</button>
    </div>
    <div class="quick-add-body">
      <div class="form-group">
        <label class="form-label">Drill Name *</label>
        <input class="form-input" id="qa-name" placeholder="e.g. Lob recovery" />
      </div>
      <div class="form-group">
        <label class="form-label">Description <span style="color:var(--text-muted);font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
        <textarea class="form-textarea" id="qa-desc" style="min-height:72px" placeholder="What is this drill?"></textarea>
      </div>
    </div>
    <div class="quick-add-footer">
      <button class="btn btn-primary" onclick="saveQuickAdd()">Save</button>
      <button class="btn btn-ghost" onclick="closeQuickAdd()">Cancel</button>
    </div>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
