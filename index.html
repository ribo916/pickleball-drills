<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickle Lab — Drill Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/src/style.css">
</head>
<body>

<nav>
  <div class="nav-logo">PICKLE<span>LAB</span></div>
  <div class="nav-actions">
    <div class="theme-btn-wrap">
      <button class="btn btn-ghost btn-icon" onclick="toggleThemePicker()" title="Switch Theme">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C6.48 2 2 6.48 2 12c0 2.4.85 4.6 2.26 6.33.7.87 1.74 1.67 3.24 1.67 1.5 0 2.5-1 2.5-2.5v-.25c0-.41.34-.75.75-.75H16c3.31 0 6-2.69 6-6 0-5.52-4.48-10-10-10z"/>
          <circle cx="8" cy="14" r="1" fill="currentColor" stroke="none"/>
          <circle cx="8" cy="9" r="1" fill="currentColor" stroke="none"/>
          <circle cx="12" cy="6.5" r="1" fill="currentColor" stroke="none"/>
          <circle cx="16" cy="9" r="1" fill="currentColor" stroke="none"/>
        </svg>
      </button>
      <div class="theme-picker" id="theme-picker">
        <button class="theme-option" data-theme="green" onclick="setTheme('green')">
          <span class="theme-swatch" style="background:#b5e853"></span>Green
        </button>
        <button class="theme-option" data-theme="blue" onclick="setTheme('blue')">
          <span class="theme-swatch" style="background:#58a6f5"></span>Blue
        </button>
        <button class="theme-option" data-theme="slate" onclick="setTheme('slate')">
          <span class="theme-swatch" style="background:#a78bfa"></span>Slate
        </button>
        <button class="theme-option" data-theme="red" onclick="setTheme('red')">
          <span class="theme-swatch" style="background:#dc2626"></span>Red <span style="opacity:0.5;font-size:10px">(light)</span>
        </button>
      </div>
    </div>
    <button class="btn btn-ghost btn-icon" onclick="showRandomizer()" title="Random Drill">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="4"/>
        <circle cx="8"  cy="8"  r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="16" cy="8"  r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="8"  cy="16" r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="16" cy="16" r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/>
      </svg>
    </button>
    <button class="btn btn-ghost" onclick="showView('library')">Drills</button>
    <button class="btn btn-primary" onclick="showCreator(null)">+ New</button>
  </div>
</nav>

<!-- LIBRARY -->
<div id="view-library" class="view active">
  <div class="library-header">
    <h1>Drill Library</h1>
    <p>Pickleball drills for weekend sessions</p>
  </div>
  <div class="filter-bar" id="filter-bar"></div>
  <div class="drill-grid" id="drill-grid"></div>
</div>

<!-- DETAIL -->
<div id="view-detail" class="view">
  <div class="detail-header">
    <button class="back-btn" onclick="showView('library')">← Back to library</button>
    <div class="detail-title" id="detail-name"></div>
    <div class="detail-meta" id="detail-meta"></div>
  </div>
  <div class="detail-goal" id="detail-goal"></div>
  <div class="notes-section" id="notes-section-wrap">
    <div class="section-label">Coaching Notes</div>
    <ul class="notes-list" id="notes-list"></ul>
  </div>
  <div id="legacy-court-section" class="legacy-court-section"></div>
  <div class="steps-section" id="steps-section-wrap">
    <div class="step-slideshow">
      <div class="step-slide-header">
        <button class="step-nav-btn" id="step-prev" onclick="stepNav(-1)">‹</button>
        <div class="step-slide-indicator" id="step-indicator"></div>
        <button class="step-nav-btn" id="step-next" onclick="stepNav(1)">›</button>
      </div>
      <div id="step-slide"></div>
    </div>
  </div>
  <div class="detail-actions">
    <button class="btn btn-ghost" onclick="editCurrentDrill()">Edit drill</button>
    <button class="btn btn-danger" onclick="deleteCurrentDrill()">Delete</button>
  </div>
</div>

<!-- CREATOR -->
<div id="view-creator" class="view">
  <div class="creator-header">
    <button class="back-btn" onclick="showView('library')">← Cancel</button>
    <div class="creator-title" id="creator-title">New Drill</div>
  </div>
  <div class="form-body">
    <div class="form-row-2">
      <div class="form-group">
        <label class="form-label">Drill Name</label>
        <input class="form-input" id="f-name" placeholder="e.g. Drip Practice" />
      </div>
      <div class="form-group">
        <label class="form-label">Player Count</label>
        <select class="form-select" id="f-players">
          <option value="4">4 players</option>
          <option value="3">3 players</option>
          <option value="2">2 players</option>
          <option value="1">1 player</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Short Description</label>
      <input class="form-input" id="f-desc" placeholder="One-line summary" />
    </div>
    <div class="form-group">
      <label class="form-label">Goal</label>
      <textarea class="form-textarea" id="f-goal" placeholder="What should players improve or focus on?"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Tags</label>
      <div class="tag-picker" id="tag-picker"></div>
      <div class="custom-tag-row">
        <input class="form-input custom-tag-input" id="custom-tag-input"
          placeholder="Add custom tag…" maxlength="32"
          onkeydown="if(event.key==='Enter'){event.preventDefault();addCustomTag()}"/>
        <button class="btn btn-ghost btn-sm" onclick="addCustomTag()">Add</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Coaching Notes <span style="color:var(--text-muted);font-weight:400;text-transform:none;letter-spacing:0">(one per line)</span></label>
      <textarea class="form-textarea" id="f-notes" placeholder="Watch for early wrist snap&#10;Reset if rally breaks down"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">Steps</label>
      <div class="step-builder" id="step-builder"></div>
      <button class="add-step-btn" onclick="addStepField()">+ Add Step</button>
    </div>
  </div>
  <div class="creator-actions">
    <button class="btn btn-primary" onclick="saveDrill()">Save Drill</button>
    <button class="btn btn-ghost" onclick="showView('library')">Cancel</button>
  </div>
</div>

<!-- RANDOMIZER -->
<div id="view-randomizer" class="view">
  <div class="randomizer-header">
    <button class="back-btn" onclick="showView('library')">← Back</button>
    <div class="randomizer-title">PICK A DRILL</div>
    <p class="randomizer-sub">Filter by tag, or just roll the dice</p>
  </div>
  <div class="randomizer-tags" id="randomizer-tags"></div>
  <div class="randomizer-action">
    <button class="btn btn-primary randomizer-roll-btn" onclick="pickRandomDrill()">🎲 Pick a Drill</button>
  </div>
  <div class="randomizer-result" id="randomizer-result"></div>
  <canvas id="randomizer-canvas"></canvas>
</div>

<div class="toast" id="toast"></div>

<!-- COURT MODAL -->
<div id="court-modal" class="court-modal" onclick="closeCourtModal()">
  <div class="court-modal-inner" onclick="event.stopPropagation()">
    <svg id="court-modal-svg" viewBox="0 0 390 540" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
